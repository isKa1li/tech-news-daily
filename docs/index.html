<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="科技日報">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>科技日報 Tech Daily</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #8ab4f8;
    --ai: #c58af9;
    --tech: #8ab4f8;
    --world: #f9c58a;
    --border: #2a2d35;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    line-height: 1.6;
  }
  header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  h1 { margin: 0; font-size: 22px; font-weight: 700; }
  .date-bar {
    display: flex; align-items: center; gap: 10px; margin-top: 8px;
    font-size: 14px; color: var(--muted);
  }
  select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 8px; font-size: 14px;
  }
  main { padding: 16px; max-width: 720px; margin: 0 auto; }
  .tldr {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 20px; border-left: 3px solid var(--accent);
  }
  .tldr-zh { font-weight: 600; margin-bottom: 6px; }
  .tldr-en { color: var(--muted); font-size: 14px; }
  .item {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 12px;
  }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .badge.ai { background: rgba(197,138,249,0.15); color: var(--ai); }
  .badge.tech { background: rgba(138,180,248,0.15); color: var(--tech); }
  .badge.world { background: rgba(249,197,138,0.15); color: var(--world); }
  .title-zh { font-size: 16px; font-weight: 600; margin: 4px 0; }
  .title-en { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .summary-zh { font-size: 14px; }
  .summary-en { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .source-row {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .source-row a { color: var(--accent); text-decoration: none; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  footer { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>📱 科技日報 Tech Daily</h1>
  <div class="date-bar">
    <span id="dateLabel">載入中...</span>
    <select id="dateSelect"></select>
  </div>
</header>
<main id="content">
  <div class="empty">載入中 / Loading...</div>
</main>
<footer>Powered by Gemini · Auto-generated daily</footer>

<script>
async function loadIndex() {
  const r = await fetch('data/index.json?t=' + Date.now());
  return r.ok ? (await r.json()).dates : [];
}
async function loadSummary(date) {
  const file = date ? `data/${date}.json` : 'data/latest.json';
  const r = await fetch(file + '?t=' + Date.now());
  if (!r.ok) return null;
  return await r.json();
}
function render(s) {
  if (!s) {
    document.getElementById('content').innerHTML = '<div class="empty">尚無資料 / No data yet.<br><br>第一次執行請等到隔天早上 7:00，或在 GitHub Actions 手動觸發。</div>';
    return;
  }
  document.getElementById('dateLabel').textContent = s.date || '';
  const items = (s.items || []).map(it => `
    <div class="item">
      <span class="badge ${it.category}">${it.category}</span>
      <div class="title-zh">${it.title_zh || ''}</div>
      <div class="title-en">${it.title_en || ''}</div>
      <div class="summary-zh">${it.summary_zh || ''}</div>
      <div class="summary-en">${it.summary_en || ''}</div>
      <div class="source-row">
        <span>${it.source || ''}</span>
        ${it.url ? `<a href="${it.url}" target="_blank" rel="noopener">原文 →</a>` : ''}
      </div>
    </div>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="tldr">
      <div class="tldr-zh">📌 ${s.tldr_zh || ''}</div>
      <div class="tldr-en">${s.tldr_en || ''}</div>
    </div>
    ${items}
  `;
}
async function init() {
  const params = new URLSearchParams(location.search);
  const wantDate = params.get('date');
  const dates = await loadIndex();
  const sel = document.getElementById('dateSelect');
  dates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
  if (wantDate && dates.includes(wantDate)) sel.value = wantDate;
  sel.onchange = () => loadSummary(sel.value).then(render);
  render(await loadSummary(sel.value || null));
}
init();
</script>
</body>
</html>
